services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: calendar_db
      POSTGRES_USER: calendar_user
      POSTGRES_PASSWORD: calendar_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  bot:
    build:
      context: .
      dockerfile: Dockerfile_bot
    depends_on:
      - db
      - web
    env_file:
      - .env
    #restart: on-failure

volumes:
  postgres_data: